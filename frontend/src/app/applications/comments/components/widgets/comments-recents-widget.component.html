<div class="recents-widget-card">
  <div class="recents-widget-card__header">
    <div class="recents-widget-card__title-wrap">
      <span class="recents-widget-card__title-icon">
        <fa-icon [icon]="icons.faCommentDots"></fa-icon>
      </span>
      <span class="recents-widget-card__title" l10nTranslate>Comments</span>
    </div>
    <button type="button" class="recents-widget-card__toggle" (click)="switchMore()">
      <fa-icon [icon]="moreElements ? icons.faMagnifyingGlassMinus : icons.faMagnifyingGlassPlus"></fa-icon>
    </button>
  </div>
  <div class="recents-widget-card__body">
    @for (c of comments(); track c.id; let i = $index) {
      <button type="button" class="recent-item-card" [style.animation-delay.ms]="i * 22" (click)="goToFile(c)">
        <span class="recent-item-card__media">
          <app-user-avatar [user]="c.author" [container]="'body'" [width]="29" [height]="29"></app-user-avatar>
        </span>
        <span class="recent-item-card__content">
          <span class="recent-item-card__title">{{ c.content }}</span>
          <span class="recent-item-card__path text-{{c.iconClass}}">
            @if (c.file.inTrash) {
              <fa-icon [icon]="icons.faTrashAlt"></fa-icon>
            }
            <fa-icon [icon]="c.icon" class="me-1"></fa-icon>
            <span>{{ c.showedPath }}</span>
          </span>
        </span>
        <span class="recent-item-card__time">{{ c.modifiedAt | amTimeAgo }}</span>
      </button>
    } @empty {
      <div class="recent-empty-state">
        <fa-icon [icon]="icons.faCommentDots" size="2x"></fa-icon>
        <div class="mt-3" l10nTranslate>No recent comments</div>
      </div>
    }
  </div>
</div>
