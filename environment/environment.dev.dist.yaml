server:
  host: 0.0.0.0
  port: 8080
  workers: 1
  trustProxy: 1
  restartOnFailure: false

logger:
  level: debug
  stdout: true
  colorize: true
  jsonOutput: false

mysql:
  url: mysql://sync_in:dev@localhost:3307/sync_in
  logQueries: false

cache:
  adapter: mysql
  ttl: 60

websocket:
  adapter: cluster
  corsOrigin: '*'

applications:
  files:
    dataPath: /tmp/sync-in-dev-data
